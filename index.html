<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manav Kaushik</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }
      #hint {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.7);
        font-family: monospace;
        font-size: 14px;
        letter-spacing: 0.08em;
        user-select: none;
        pointer-events: none;
      }
      body.inverted #hint {
        color: rgba(0, 0, 0, 0.7);
      }
      #parchment {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        z-index: 10;
      }
      #parchment.open {
        display: flex;
      }
      #parchment-paper {
        position: relative;
        max-width: 480px;
        width: calc(100% - 48px);
        max-height: 80vh;
        overflow-y: auto;
        padding: 44px 48px;
        box-sizing: border-box;
        transform: rotate(-0.6deg);
        color: #43301c;
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 17px;
        line-height: 1.65;
        /* aged paper: warm base + blotches + darkened, uneven edges */
        background:
          radial-gradient(
            ellipse at 18% 12%,
            rgba(112, 78, 38, 0.16),
            transparent 42%
          ),
          radial-gradient(
            ellipse at 85% 30%,
            rgba(112, 78, 38, 0.12),
            transparent 38%
          ),
          radial-gradient(
            ellipse at 70% 90%,
            rgba(96, 64, 28, 0.18),
            transparent 45%
          ),
          radial-gradient(
            ellipse at 8% 78%,
            rgba(96, 64, 28, 0.1),
            transparent 35%
          ),
          linear-gradient(160deg, #e8d5a8 0%, #dbc48f 48%, #cfb379 100%);
        border-radius: 3% 6% 4% 7% / 6% 3% 7% 4%;
        box-shadow:
          inset 0 0 34px rgba(84, 55, 20, 0.45),
          inset 0 0 6px rgba(84, 55, 20, 0.3),
          0 12px 40px rgba(0, 0, 0, 0.8);
      }
      #parchment-text {
        margin: 0;
        white-space: pre-wrap;
        font-family: inherit;
      }
      #parchment-close {
        position: absolute;
        top: 10px;
        right: 14px;
        border: none;
        background: none;
        color: #6b4f2a;
        font-family: Georgia, serif;
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
        padding: 4px;
      }
      #parchment-close:hover {
        color: #43301c;
      }
    </style>
  </head>
  <body>
    <div id="hint">drag to look &mdash; WASD move &mdash; SPACE jump &times;2 &mdash; E air dash &mdash; SHIFT sprint &mdash; C crouch</div>
    <div id="parchment">
      <div id="parchment-paper">
        <button id="parchment-close" aria-label="close">&#10005;</button>
        <pre id="parchment-text"></pre>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
